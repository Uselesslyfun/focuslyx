<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focuslyx</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Logo -->
    <div class="navbar">
        <img src="logo.JPG" class="logo-img">
    </div>

    <!-- Timer -->
    <div class="top-right">
        <p class="subtitle">Focus session in progress</p>

        <div class="timer" id="timer">00:00</div>

        <div class="controls">
            <button onclick="togglePause()" id="pauseBtn">Pause</button>
        </div>
    </div>

    <!-- Input (bottom right) -->
    <div class="input-box">
        <input type="text" id="noteInput" placeholder="Type and press Enter..." />
    </div>

    <!-- Notes (bottom left) -->
    <div id="notesContainer"></div>

    <script src="script.js"></script>
</body>
</html>
